# erbina recipe — helmfile, a cli-tool. Declaratively manage Helm releases.
id: helmfile
kind: cli-tool
title: "helmfile — deploy Kubernetes Helm charts declaratively"
description: >
  helmfile lets you declaratively manage a collection of Helm chart
  releases as code, templating values and orchestrating installs/upgrades
  across environments. https://github.com/helmfile/helmfile

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "helmfile --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install helmfile"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "helmfile --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "helmfile --version"
  latest: { github: helmfile/helmfile }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade helmfile"

scope: user
