# erbina recipe — hlint, a cli-tool. Linter for Haskell.
id: hlint
kind: cli-tool
title: "hlint — a tool for suggesting possible improvements to Haskell code"
description: >
  HLint reads Haskell programs and suggests changes that hopefully make
  them easier to read, also detecting some errors and redundant code.
  https://github.com/ndmitchell/hlint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "hlint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install hlint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "hlint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "hlint --version"
  latest: { github: ndmitchell/hlint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade hlint"

scope: user
