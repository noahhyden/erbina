# erbina recipe — gitlint, a cli-tool. Lint git commit messages.
id: gitlint
kind: cli-tool
title: "gitlint — a git commit message linter written in Python"
description: >
  gitlint is a git commit message linter written in Python that checks
  messages against configurable rules, commonly used in a commit-msg hook.
  https://github.com/jorisroovers/gitlint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gitlint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install gitlint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gitlint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gitlint --version"
  latest: { github: jorisroovers/gitlint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade gitlint"

scope: user
