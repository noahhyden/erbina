# erbina recipe — gitleaks, a cli-tool. Scan git history for secrets.
id: gitleaks
kind: cli-tool
title: "gitleaks — detect secrets in code"
description: >
  Gitleaks is a fast, lightweight secrets scanner for git repositories,
  files and directories, detecting hardcoded passwords, API keys and
  tokens. https://github.com/gitleaks/gitleaks

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gitleaks version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gitleaks"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Gitleaks.Gitleaks --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gitleaks version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gitleaks version"
  latest: { github: gitleaks/gitleaks }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gitleaks"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Gitleaks.Gitleaks --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
