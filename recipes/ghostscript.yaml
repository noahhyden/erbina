# erbina recipe — ghostscript, a cli-tool. PostScript/PDF interpreter (`gs`).
id: ghostscript
kind: cli-tool
title: "ghostscript — an interpreter for PostScript and PDF (`gs`)"
description: >
  Ghostscript is an interpreter for the PostScript language and PDF files;
  the gs command renders, converts and manipulates these documents.
  https://www.ghostscript.com/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gs --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ghostscript"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gs --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ghostscript"

scope: user
category: media
