# erbina recipe — git-absorb, a cli-tool. Auto-fixup staged changes into commits.
id: git-absorb
kind: cli-tool
title: "git-absorb — automatically absorb staged changes into your recent commits"
description: >
  git-absorb automatically figures out which of your recent commits a
  staged change belongs to and creates the fixup commits for you,
  streamlining interactive rebases.
  https://github.com/tummychow/git-absorb

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "git-absorb --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install git-absorb"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id tummychow.git-absorb --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install git-absorb"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "git-absorb --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "git-absorb --version"
  latest: { github: tummychow/git-absorb }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade git-absorb"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id tummychow.git-absorb --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install git-absorb"

scope: user
