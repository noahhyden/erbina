# erbina recipe — brotli, a cli-tool. Brotli lossless compression.
id: brotli
kind: cli-tool
title: "brotli — a generic-purpose lossless compression algorithm"
description: >
  Brotli is a generic-purpose lossless compression algorithm that
  compresses data with a high ratio, widely used for compressing web
  assets. https://github.com/google/brotli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "brotli --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install brotli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "brotli --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "brotli --version"
  latest: { github: google/brotli }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade brotli"

scope: user
