# erbina recipe — curl, a cli-tool. Transfer data with URLs.
id: curl
kind: cli-tool
title: "curl — a command-line tool for transferring data with URLs"
description: >
  curl is a command-line tool and library for transferring data with URLs,
  supporting a huge range of protocols; the workhorse of HTTP scripting.
  https://github.com/curl/curl

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "curl --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install curl"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id cURL.cURL --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "curl --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "curl --version"
  latest: { github: curl/curl }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade curl"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id cURL.cURL --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
