# erbina recipe — bpython, a cli-tool. Lightweight Python REPL with hints.
id: bpython
kind: cli-tool
title: "bpython — a fancy interface to the Python interpreter"
description: >
  bpython is a fancy interface to the Python interpreter that adds in-line
  syntax highlighting, autocomplete suggestions and an auto-indenting
  REPL. https://github.com/bpython/bpython

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "bpython --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install bpython"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "bpython --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "bpython --version"
  latest: { github: bpython/bpython }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade bpython"

scope: user
