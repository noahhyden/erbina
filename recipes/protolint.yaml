# erbina recipe — protolint, a cli-tool. Linter for Protocol Buffers.
id: protolint
kind: cli-tool
title: "protolint — a pluggable linter and fixer to enforce Protocol Buffer style and conventions"
description: >
  protolint is a pluggable linter and fixer to enforce Protocol Buffer
  style and conventions, catching naming and layout issues in .proto
  files. https://github.com/yoheimuta/protolint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "protolint version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install protolint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "protolint version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "protolint version"
  latest: { github: yoheimuta/protolint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade protolint"

scope: user
