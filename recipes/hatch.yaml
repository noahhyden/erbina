# erbina recipe — hatch, a cli-tool. Modern Python project manager.
id: hatch
kind: cli-tool
title: "hatch — a modern, extensible Python project manager"
description: >
  Hatch is a modern, extensible Python project manager from the PyPA that
  handles environments, building and publishing packages, and project
  scaffolding. https://github.com/pypa/hatch

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "hatch --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install hatch"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "hatch --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "hatch --version"
  latest: { github: pypa/hatch }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade hatch"

scope: user
