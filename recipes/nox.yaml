# erbina recipe — nox, a cli-tool. Python task automation (tox alternative).
id: nox
kind: cli-tool
title: "nox — flexible test automation with Python"
description: >
  Nox is a command-line tool that automates testing in multiple Python
  environments, configured with a Python file instead of INI, a flexible
  tox alternative. https://github.com/wntrblm/nox

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "nox --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install nox"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "nox --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "nox --version"
  latest: { github: wntrblm/nox }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade nox"

scope: user
