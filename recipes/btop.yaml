# erbina recipe — btop, a cli-tool. Colorful resource monitor.
id: btop
kind: cli-tool
title: "btop — a monitor of resources"
description: >
  btop is a resource monitor that shows usage and stats for processor,
  memory, disks, network and processes with a responsive, mouse-driven
  TUI. https://github.com/aristocratos/btop

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "btop --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install btop"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "btop --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "btop --version"
  latest: { github: aristocratos/btop }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade btop"

scope: user
