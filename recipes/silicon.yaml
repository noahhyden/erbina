# erbina recipe — silicon, a cli-tool. Render source code to images.
id: silicon
kind: cli-tool
title: "silicon — create beautiful images of your source code"
description: >
  silicon renders your source code into beautiful images (like carbon, but
  offline), useful for sharing snippets on social media or in slides.
  https://github.com/Aloxaf/silicon

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "silicon --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install silicon"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install silicon"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "silicon --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "silicon --version"
  latest: { github: Aloxaf/silicon }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade silicon"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install silicon"

scope: user
