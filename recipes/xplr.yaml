# erbina recipe — xplr, a cli-tool. Hackable TUI file explorer.
id: xplr
kind: cli-tool
title: "xplr — a hackable, minimal, fast TUI file explorer"
description: >
  xplr is a hackable, minimal and fast TUI file explorer that is highly
  customizable through Lua and integrates cleanly into shell workflows.
  https://github.com/sayanarijit/xplr

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "xplr --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install xplr"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xplr"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "xplr --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "xplr --version"
  latest: { github: sayanarijit/xplr }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade xplr"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xplr"

scope: user
