# erbina recipe — ko, a cli-tool. Container images for Go, no Dockerfile.
id: ko
kind: cli-tool
title: "ko — build and deploy Go applications on Kubernetes"
description: >
  ko is a simple, fast container image builder for Go applications that
  builds images without a Dockerfile or Docker daemon and can deploy them
  to Kubernetes. https://github.com/ko-build/ko

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ko version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ko"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ko version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ko version"
  latest: { github: ko-build/ko }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ko"

scope: user
