# erbina recipe — papermill, a cli-tool. Parameterize and run notebooks.
id: papermill
kind: cli-tool
title: "papermill — parameterize, execute and analyze Jupyter notebooks"
description: >
  papermill is a tool for parameterizing, executing and analyzing Jupyter
  notebooks, enabling notebooks to be run as reusable, parameterized
  reports. https://github.com/nteract/papermill

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "papermill --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install papermill"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "papermill --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "papermill --version"
  latest: { github: nteract/papermill }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade papermill"

scope: user
