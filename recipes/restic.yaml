# erbina recipe — restic, a cli-tool. Encrypted, deduplicated backups.
id: restic
kind: cli-tool
title: "restic — fast, secure, efficient backup program"
description: >
  restic is a fast, secure and efficient backup program that stores
  encrypted, deduplicated snapshots to many backends, local or cloud.
  https://github.com/restic/restic

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "restic version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install restic"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id restic.restic --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "restic version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "restic version"
  latest: { github: restic/restic }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade restic"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id restic.restic --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
