# erbina recipe — vercel, a cli-tool. Deploy to Vercel from the CLI.
id: vercel
kind: cli-tool
title: "vercel — the command-line interface for Vercel"
description: >
  The Vercel CLI lets you deploy and manage projects on the Vercel
  platform from your terminal, including preview deployments and
  environment management. https://github.com/vercel/vercel

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "vercel --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g vercel"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "vercel --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g vercel"

scope: user
