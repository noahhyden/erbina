# erbina recipe — bun, a cli-tool. Fast JS runtime + toolkit.
id: bun
kind: cli-tool
title: "bun — an incredibly fast JavaScript runtime, bundler, transpiler and package manager"
description: >
  Bun is an all-in-one JavaScript runtime, bundler, transpiler and package
  manager designed for speed, a drop-in-ish faster alternative to Node.js.
  https://github.com/oven-sh/bun

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "bun --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install bun"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "bun --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "bun --version"
  latest: { github: oven-sh/bun }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade bun"

scope: user
