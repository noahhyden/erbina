# erbina recipe — gron, a cli-tool. Flatten JSON into greppable lines.
id: gron
kind: cli-tool
title: "gron — make JSON greppable"
description: >
  gron transforms JSON into discrete, greppable assignments so you can use
  grep to find the path to a value and then reconstruct the JSON.
  https://github.com/tomnomnom/gron

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gron --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gron"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id TomHudson.gron --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: go
      when: "command -v go"
      run: "go install github.com/tomnomnom/gron@latest"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gron --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gron --version"
  latest: { github: tomnomnom/gron }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gron"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id TomHudson.gron --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: go
      when: "command -v go"
      run: "go install github.com/tomnomnom/gron@latest"

scope: user
