# erbina recipe — pyenv, a cli-tool. Manage multiple Python versions.
id: pyenv
kind: cli-tool
title: "pyenv — simple Python version management"
description: >
  pyenv lets you easily switch between multiple versions of Python per
  user, shell or project, building versions from source and shimming the
  python command. https://github.com/pyenv/pyenv

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pyenv --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pyenv"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pyenv --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pyenv --version"
  latest: { github: pyenv/pyenv }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pyenv"

scope: user
category: languages
