# erbina recipe — eksctl, a cli-tool. Create and manage EKS clusters.
id: eksctl
kind: cli-tool
title: "eksctl — the official CLI for Amazon EKS"
description: >
  eksctl is the official CLI for Amazon EKS, creating and managing
  Kubernetes clusters on AWS with a single command and sensible defaults.
  https://github.com/eksctl-io/eksctl

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "eksctl version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install eksctl"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "eksctl version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "eksctl version"
  latest: { github: eksctl-io/eksctl }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade eksctl"

scope: user
