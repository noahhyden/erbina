# erbina recipe — kubectl, a cli-tool. Control Kubernetes clusters.
id: kubectl
kind: cli-tool
title: "kubectl — the Kubernetes command-line tool"
description: >
  kubectl is the Kubernetes command-line tool for running commands against
  clusters: deploy applications, inspect and manage resources, and view
  logs. https://github.com/kubernetes/kubernetes

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kubectl version --client"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kubernetes-cli"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Kubernetes.kubectl --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kubectl version --client"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kubectl version --client"
  latest: { github: kubernetes/kubernetes }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kubernetes-cli"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Kubernetes.kubectl --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
