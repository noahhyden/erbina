# erbina recipe — deno, a cli-tool. Secure JS/TS runtime.
id: deno
kind: cli-tool
title: "deno — a modern runtime for JavaScript and TypeScript"
description: >
  Deno is a modern, secure runtime for JavaScript and TypeScript with
  built-in tooling (formatter, linter, test runner) and first-class
  TypeScript support. https://github.com/denoland/deno

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "deno --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install deno"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id DenoLand.Deno --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "deno --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "deno --version"
  latest: { github: denoland/deno }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade deno"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id DenoLand.Deno --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
