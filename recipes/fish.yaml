# erbina recipe — fish, a cli-tool. Friendly interactive shell.
id: fish
kind: cli-tool
title: "fish — the friendly interactive shell"
description: >
  fish is a smart and user-friendly command-line shell with
  autosuggestions, syntax highlighting and sane defaults, working great
  out of the box. https://github.com/fish-shell/fish-shell

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "fish --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install fish"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "fish --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "fish --version"
  latest: { github: fish-shell/fish-shell }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade fish"

scope: user
