# erbina recipe — the official MCP "memory" server (kind: mcp-server).
# A Node/npx server (like sequentialthinking): uvx isn't involved; the work is
# the scope-aware wiring. ${scope} is substituted from `bootstrap`.
id: memory
kind: mcp-server
title: "memory — official MCP server for a persistent knowledge graph"
description: >
  The Model Context Protocol reference "memory" server: gives an agent a simple
  persistent knowledge graph (entities, relations, observations) it can read and
  write across turns. Runs via npx, so wiring it into a scope is the work.

# 1. DETECT — already registered? `claude mcp get` resolves project scope by cwd.
detect:
  command: "claude mcp get memory"
  expect_exit: 0
  needs_project_dir: true

# 2. INSTALL — nothing to download; confirm the runtime that launches it (npx).
install:
  methods:
    - id: npx
      when: "command -v npx"
      run: "command -v npx"

# 3. CONFIGURE — scope-aware wiring at ${scope}, via npx.
configure:
  steps:
    - run: "claude mcp add memory --scope ${scope} -- npx -y @modelcontextprotocol/server-memory"
      needs_project_dir: true

# 4. VERIFY — Claude Code can see the server at the chosen scope.
verify:
  - command: "claude mcp get memory"
    expect_exit: 0
    needs_project_dir: true

scope: project
