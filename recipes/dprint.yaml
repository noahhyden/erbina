# erbina recipe — dprint, a cli-tool. Pluggable multi-language formatter.
id: dprint
kind: cli-tool
title: "dprint — a pluggable and configurable code formatting platform"
description: >
  dprint is a pluggable and configurable code formatting platform written
  in Rust, formatting TypeScript, JSON, Markdown, TOML and more via WASM
  plugins. https://github.com/dprint/dprint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "dprint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install dprint"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install dprint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "dprint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "dprint --version"
  latest: { github: dprint/dprint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade dprint"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install dprint"

scope: user
