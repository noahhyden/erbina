# erbina recipe — mob, a cli-tool. Handover tool for mob programming.
id: mob
kind: cli-tool
title: "mob — a fast way to switch between roles when doing remote mob programming"
description: >
  mob is a command-line tool that makes it fast and smooth to hand over
  control between people during remote pair and mob programming sessions
  via git. https://github.com/remotemobprogramming/mob

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "mob version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install mob"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "mob version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "mob version"
  latest: { github: remotemobprogramming/mob }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade mob"

scope: user
