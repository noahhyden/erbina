# erbina recipe — cheat, a cli-tool. Interactive command cheatsheets.
id: cheat
kind: cli-tool
title: "cheat — create and view interactive cheatsheets on the command line"
description: >
  cheat allows you to create and view interactive cheatsheets on the
  command line, so you can quickly recall usage examples for commands you
  use infrequently. https://github.com/cheat/cheat

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "cheat --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install cheat"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "cheat --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "cheat --version"
  latest: { github: cheat/cheat }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade cheat"

scope: user
