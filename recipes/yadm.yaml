# erbina recipe — yadm, a cli-tool. Git-based dotfiles manager.
id: yadm
kind: cli-tool
title: "yadm — yet another dotfiles manager"
description: >
  yadm (Yet Another Dotfiles Manager) wraps a bare git repository to
  manage dotfiles, adding alternate files, encryption and bootstrap hooks
  per host. https://github.com/TheLocehiliosan/yadm

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "yadm --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install yadm"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "yadm --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "yadm --version"
  latest: { github: TheLocehiliosan/yadm }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade yadm"

scope: user
