# erbina recipe — cpanminus, a cli-tool. Zero-config CPAN installer (`cpanm`).
id: cpanminus
kind: cli-tool
title: "cpanminus — get, unpack, build and install modules from CPAN (`cpanm`)"
description: >
  cpanminus (cpanm) is a script to get, unpack, build and install modules
  from CPAN with zero configuration, a lightweight alternative to the CPAN
  shell. https://github.com/miyagawa/cpanminus

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "cpanm --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install cpanminus"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "cpanm --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade cpanminus"

scope: user
