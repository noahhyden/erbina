# erbina recipe — pkg-config, a cli-tool. Query installed library build flags.
id: pkg-config
kind: cli-tool
title: "pkg-config — a helper tool used when compiling applications and libraries"
description: >
  pkg-config is a helper tool used when compiling applications and
  libraries, providing the correct compiler and linker flags for installed
  libraries. https://www.freedesktop.org/wiki/Software/pkg-config/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pkg-config --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pkg-config"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pkg-config --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pkg-config"

scope: user
