# erbina recipe — vifm, a cli-tool. Vi-like curses file manager.
id: vifm
kind: cli-tool
title: "vifm — a file manager with curses interface, providing Vi[m]-like environment"
description: >
  vifm is a curses-based file manager that brings a Vi/Vim-like keybinding
  environment to file management, with two-panel navigation and a command
  mode. https://vifm.info/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "vifm --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install vifm"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "vifm --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade vifm"

scope: user
