# erbina recipe — localtunnel, a cli-tool. Expose localhost publicly (`lt`).
id: localtunnel
kind: cli-tool
title: "localtunnel — expose your localhost to the world (`lt`)"
description: >
  localtunnel exposes your locally running web server to the world through
  a public URL, useful for demos, webhooks and testing on real devices.
  https://github.com/localtunnel/localtunnel

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "lt --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g localtunnel"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "lt --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g localtunnel"

scope: user
