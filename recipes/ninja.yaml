# erbina recipe — ninja, a cli-tool. Fast, minimal build system.
id: ninja
kind: cli-tool
title: "ninja — a small build system with a focus on speed"
description: >
  Ninja is a small build system with a focus on speed, designed to have
  its input files generated by a higher-level build system and to run
  builds as fast as possible. https://github.com/ninja-build/ninja

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ninja --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ninja"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ninja --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ninja --version"
  latest: { github: ninja-build/ninja }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ninja"

scope: user
