# erbina recipe — semgrep, a cli-tool. Fast, rule-based static analysis.
id: semgrep
kind: cli-tool
title: "semgrep — lightweight static analysis for many languages"
description: >
  Semgrep is a fast, open-source static analysis tool for finding bugs and
  enforcing code standards across many languages using simple, code-like
  patterns. https://github.com/semgrep/semgrep

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "semgrep --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install semgrep"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "semgrep --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "semgrep --version"
  latest: { github: semgrep/semgrep }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade semgrep"

scope: user
