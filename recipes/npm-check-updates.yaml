# erbina recipe — npm-check-updates, a cli-tool. Upgrade package.json deps (`ncu`).
id: npm-check-updates
kind: cli-tool
title: "npm-check-updates — upgrade your package.json dependencies to the latest versions (`ncu`)"
description: >
  npm-check-updates upgrades your package.json dependencies to the latest
  versions, ignoring the specified ranges, so you can update everything in
  one step. https://github.com/raineorshine/npm-check-updates

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ncu --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g npm-check-updates"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ncu --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ncu --version"
  latest: { github: raineorshine/npm-check-updates }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g npm-check-updates"

scope: user
