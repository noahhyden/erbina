# erbina recipe — pnpm, a cli-tool. Fast, space-efficient npm alternative.
id: pnpm
kind: cli-tool
title: "pnpm — fast, disk space-efficient package manager"
description: >
  pnpm is a fast, disk-space-efficient package manager for Node.js that
  uses a content-addressable store and strict, non-flat node_modules.
  https://github.com/pnpm/pnpm

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pnpm --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pnpm"
    - id: npm
      when: "command -v npm"
      run: "npm install -g pnpm"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pnpm --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pnpm --version"
  latest: { github: pnpm/pnpm }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pnpm"
    - id: npm
      when: "command -v npm"
      run: "npm update -g pnpm"

scope: user
