# erbina recipe — navi, a cli-tool. Interactive cheatsheet launcher.
id: navi
kind: cli-tool
title: "navi — an interactive cheatsheet tool for the CLI"
description: >
  navi is an interactive cheatsheet tool for the command line that lets
  you browse, compose and run commands from cheatsheets instead of
  memorizing them. https://github.com/denisidoro/navi

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "navi --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install navi"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install navi"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "navi --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "navi --version"
  latest: { github: denisidoro/navi }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade navi"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install navi"

scope: user
