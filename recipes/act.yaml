# erbina recipe — act, a cli-tool. Run GitHub Actions locally.
id: act
kind: cli-tool
title: "act — run your GitHub Actions locally"
description: >
  act lets you run your GitHub Actions locally using Docker, giving fast
  feedback on workflow changes without pushing and waiting on CI.
  https://github.com/nektos/act

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "act --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install act"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "act --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "act --version"
  latest: { github: nektos/act }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade act"

scope: user
