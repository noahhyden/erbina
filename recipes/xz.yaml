# erbina recipe — xz, a cli-tool. High-ratio compression (xz/LZMA).
id: xz
kind: cli-tool
title: "xz — a general-purpose data compression tool with high compression ratio"
description: >
  xz is a general-purpose data compression tool using the LZMA2 algorithm
  for a high compression ratio, common for source tarballs and packages.
  https://tukaani.org/xz/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "xz --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install xz"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "xz --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade xz"

scope: user
