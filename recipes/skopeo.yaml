# erbina recipe — skopeo, a cli-tool. Inspect and copy container images.
id: skopeo
kind: cli-tool
title: "skopeo — work with remote container images registries"
description: >
  skopeo performs operations on container images and image registries
  without a daemon: inspect, copy, sign and delete images across
  registries. https://github.com/containers/skopeo

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "skopeo --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install skopeo"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "skopeo --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "skopeo --version"
  latest: { github: containers/skopeo }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade skopeo"

scope: user
