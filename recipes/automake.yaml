# erbina recipe — automake, a cli-tool. Generate portable Makefiles.
id: automake
kind: cli-tool
title: "automake — a tool for automatically generating Makefile.in files"
description: >
  GNU Automake is a tool for automatically generating Makefile.in files
  compliant with the GNU Coding Standards, working together with Autoconf.
  https://www.gnu.org/software/automake/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "automake --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install automake"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "automake --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade automake"

scope: user
