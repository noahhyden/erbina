# erbina recipe — rollup, a cli-tool. ES-module JavaScript bundler.
id: rollup
kind: cli-tool
title: "rollup — a module bundler for JavaScript"
description: >
  Rollup is a module bundler for JavaScript that compiles small pieces of
  code into larger, more complex bundles, excelling at tree-shaken
  ES-module libraries. https://github.com/rollup/rollup

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "rollup --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g rollup"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "rollup --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "rollup --version"
  latest: { github: rollup/rollup }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g rollup"

scope: user
