# erbina recipe — wrangler, a cli-tool. Build & deploy Cloudflare Workers.
id: wrangler
kind: cli-tool
title: "wrangler — the command-line interface for building Cloudflare Workers"
description: >
  Wrangler is the CLI for building, previewing and deploying Cloudflare
  Workers and related edge services like Pages, KV, R2 and D1.
  https://github.com/cloudflare/workers-sdk

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "wrangler --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g wrangler"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "wrangler --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g wrangler"

scope: user
