# erbina recipe — neovim, a cli-tool. Hyperextensible Vim fork (`nvim`).
id: neovim
kind: cli-tool
title: "neovim — hyperextensible Vim-based text editor (`nvim`)"
description: >
  Neovim is a hyperextensible Vim-based text editor with a built-in LSP
  client, Lua scripting and an async plugin architecture, focused on
  extensibility and usability. https://github.com/neovim/neovim

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "nvim --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install neovim"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Neovim.Neovim --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "nvim --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "nvim --version"
  latest: { github: neovim/neovim }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade neovim"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Neovim.Neovim --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
