# erbina recipe — commitizen, a cli-tool. Conventional commits + versioning (`cz`).
id: commitizen
kind: cli-tool
title: "commitizen — create committing rules, bump versions and generate changelogs (`cz`)"
description: >
  Commitizen is a tool to define committing rules, create standardized
  commit messages, bump project versions and generate changelogs following
  Conventional Commits. https://github.com/commitizen-tools/commitizen

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "cz version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install commitizen"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "cz version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "cz version"
  latest: { github: commitizen-tools/commitizen }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade commitizen"

scope: user
