# erbina recipe — dasel, a cli-tool. jq/yq for many data formats.
id: dasel
kind: cli-tool
title: "dasel — select, put and delete data from JSON, TOML, YAML, XML and CSV"
description: >
  dasel (data-selector) queries and modifies JSON, TOML, YAML, XML and CSV
  using a single selector syntax, a unified alternative to jq and yq.
  https://github.com/TomWright/dasel

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "dasel --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install dasel"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "dasel --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "dasel --version"
  latest: { github: TomWright/dasel }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade dasel"

scope: user
