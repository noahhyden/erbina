# erbina recipe — xh, a cli-tool. Fast HTTPie-like HTTP client.
id: xh
kind: cli-tool
title: "xh — a friendly and fast tool for sending HTTP requests"
description: >
  xh is a friendly and fast tool for sending HTTP requests, reimplementing
  the expressive HTTPie syntax in Rust for near-instant startup.
  https://github.com/ducaale/xh

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "xh --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install xh"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xh"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "xh --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "xh --version"
  latest: { github: ducaale/xh }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade xh"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xh"

scope: user
