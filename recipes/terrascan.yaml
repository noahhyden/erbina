# erbina recipe — terrascan, a cli-tool. Policy/compliance scanner for IaC.
id: terrascan
kind: cli-tool
title: "terrascan — detect compliance and security violations across infrastructure as code"
description: >
  Terrascan detects compliance and security violations across
  infrastructure-as-code to mitigate risk before provisioning cloud-native
  infrastructure. https://github.com/tenable/terrascan

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "terrascan version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install terrascan"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "terrascan version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "terrascan version"
  latest: { github: tenable/terrascan }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade terrascan"

scope: user
