# erbina recipe — trunk, a cli-tool. Bundler for Rust WASM web apps.
id: trunk
kind: cli-tool
title: "trunk — build, bundle and ship your Rust WASM application to the web"
description: >
  Trunk is a WASM web application bundler for Rust that builds, bundles
  and ships your app with zero-config asset pipelines and a built-in dev
  server. https://github.com/trunk-rs/trunk

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "trunk --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install trunk"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install trunk"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "trunk --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "trunk --version"
  latest: { github: trunk-rs/trunk }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade trunk"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install trunk"

scope: user
