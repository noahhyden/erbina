# erbina recipe — litecli, a cli-tool. Better SQLite CLI client.
id: litecli
kind: cli-tool
title: "litecli — a command-line client for SQLite with auto-completion and syntax highlighting"
description: >
  litecli is a command-line client for SQLite databases with
  auto-completion and syntax highlighting, part of the dbcli family of
  database clients. https://github.com/dbcli/litecli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "litecli --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install litecli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "litecli --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "litecli --version"
  latest: { github: dbcli/litecli }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade litecli"

scope: user
