# erbina recipe — hgrep, a cli-tool. grep with rich, contextual output.
id: hgrep
kind: cli-tool
title: "hgrep — human-friendly grep with a rich display"
description: >
  hgrep is a human-friendly grep tool that shows search results with
  syntax highlighting and surrounding context, like ripgrep results
  rendered with a pager. https://github.com/rhysd/hgrep

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "hgrep --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install hgrep"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install hgrep"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "hgrep --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "hgrep --version"
  latest: { github: rhysd/hgrep }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade hgrep"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install hgrep"

scope: user
