# erbina recipe — pip-audit, a cli-tool. Scan Python deps for CVEs.
id: pip-audit
kind: cli-tool
title: "pip-audit — audit Python environments and dependency trees for known vulnerabilities"
description: >
  pip-audit is a tool from the PyPA for scanning Python environments and
  dependency trees for packages with known vulnerabilities.
  https://github.com/pypa/pip-audit

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pip-audit --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install pip-audit"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pip-audit --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pip-audit --version"
  latest: { github: pypa/pip-audit }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade pip-audit"

scope: user
