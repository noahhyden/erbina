# erbina recipe — kalker, a cli-tool. Scientific CLI calculator.
id: kalker
kind: cli-tool
title: "kalker — a scientific calculator that supports math-like syntax"
description: >
  kalker is a scientific calculator with support for math-like syntax,
  user-defined variables and functions, complex numbers, and unit
  conversions. https://github.com/PaddiM8/kalker

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kalker --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kalker"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id PaddiM8.kalker --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install kalker"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kalker --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kalker --version"
  latest: { github: PaddiM8/kalker }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kalker"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id PaddiM8.kalker --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install kalker"

scope: user
