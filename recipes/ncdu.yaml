# erbina recipe — ncdu, a cli-tool. Interactive disk usage in ncurses.
id: ncdu
kind: cli-tool
title: "ncdu — NCurses disk usage"
description: >
  ncdu is a disk usage analyzer with an ncurses interface, designed to
  find wasted disk space quickly on remote servers over SSH.
  https://code.blicky.net/yorhel/ncdu

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ncdu --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ncdu"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ncdu --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ncdu"

scope: user
