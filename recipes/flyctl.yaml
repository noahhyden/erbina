# erbina recipe — flyctl, a cli-tool. Deploy apps on Fly.io.
id: flyctl
kind: cli-tool
title: "flyctl — the command-line interface for Fly.io"
description: >
  flyctl is the command-line interface for Fly.io, used to launch, deploy,
  scale and manage applications running on the Fly.io global application
  platform. https://github.com/superfly/flyctl

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "flyctl version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install flyctl"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "flyctl version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "flyctl version"
  latest: { github: superfly/flyctl }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade flyctl"

scope: user
