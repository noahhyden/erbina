# erbina recipe — kustomize, a cli-tool. Template-free Kubernetes config.
id: kustomize
kind: cli-tool
title: "kustomize — customization of Kubernetes YAML configurations"
description: >
  Kustomize introduces a template-free way to customize Kubernetes YAML
  configurations, layering overlays over a base without forking the
  original manifests. https://github.com/kubernetes-sigs/kustomize

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kustomize version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kustomize"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kustomize version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kustomize version"
  latest: { github: kubernetes-sigs/kustomize }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kustomize"

scope: user
