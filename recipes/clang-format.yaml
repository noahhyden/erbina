# erbina recipe — clang-format, a cli-tool. Format C/C++/Obj-C code.
id: clang-format
kind: cli-tool
title: "clang-format — a tool to format C, C++, Objective-C and related code"
description: >
  clang-format is a tool from the LLVM project to automatically format C,
  C++, Objective-C, Java, JavaScript and Protobuf code according to a
  configurable style. https://clang.llvm.org/docs/ClangFormat.html

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "clang-format --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install clang-format"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "clang-format --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade clang-format"

scope: user
