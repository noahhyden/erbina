# erbina recipe — ag, a cli-tool. Fast code search (`ag`).
id: ag
kind: cli-tool
title: "the_silver_searcher — a code-searching tool similar to ack, but faster (`ag`)"
description: >
  The Silver Searcher (ag) is a code-searching tool similar to ack but
  much faster, ignoring files matched by .gitignore and searching huge
  trees quickly. https://github.com/ggreer/the_silver_searcher

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ag --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install the_silver_searcher"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ag --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade the_silver_searcher"

scope: user
