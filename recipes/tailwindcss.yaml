# erbina recipe — tailwindcss, a cli-tool. Tailwind CSS standalone CLI.
id: tailwindcss
kind: cli-tool
title: "tailwindcss — a utility-first CSS framework CLI"
description: >
  The Tailwind CSS CLI builds your utility-first stylesheets, scanning
  your templates for class names and generating an optimized CSS file.
  https://github.com/tailwindlabs/tailwindcss

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "tailwindcss --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: winget
      when: "winget --version"
      run: "winget install -e --id TailwindLabs.TailwindCSS --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: npm
      when: "command -v npm"
      run: "npm install -g tailwindcss"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "tailwindcss --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "tailwindcss --version"
  latest: { github: tailwindlabs/tailwindcss }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id TailwindLabs.TailwindCSS --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: npm
      when: "command -v npm"
      run: "npm update -g tailwindcss"

scope: user
category: build
