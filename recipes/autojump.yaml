# erbina recipe — autojump, a cli-tool. Jump to frequent directories.
id: autojump
kind: cli-tool
title: "autojump — a faster way to navigate your filesystem"
description: >
  autojump is a faster way to navigate your filesystem: it maintains a
  database of the directories you use and lets you jump to them by a
  substring. https://github.com/wting/autojump

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "autojump --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install autojump"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "autojump --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "autojump --version"
  latest: { github: wting/autojump }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade autojump"

scope: user
