# erbina recipe — the official MCP "everything" server (kind: mcp-server).
# A Node/npx server that exercises the full MCP surface (tools, resources,
# prompts) — handy for testing a client. Wiring it into a scope is the work.
id: everything
kind: mcp-server
title: "everything — official MCP reference/test server exercising the full protocol"
description: >
  The Model Context Protocol reference "everything" server: exposes example
  tools, resources, and prompts covering the whole protocol, useful for exercising
  or demoing an MCP client. Runs via npx, so wiring it into a scope is the work.

# 1. DETECT — already registered? `claude mcp get` resolves project scope by cwd.
detect:
  command: "claude mcp get everything"
  expect_exit: 0
  needs_project_dir: true

# 2. INSTALL — nothing to download; confirm the runtime that launches it (npx).
install:
  methods:
    - id: npx
      when: "command -v npx"
      run: "command -v npx"

# 3. CONFIGURE — scope-aware wiring at ${scope}, via npx.
configure:
  steps:
    - run: "claude mcp add everything --scope ${scope} -- npx -y @modelcontextprotocol/server-everything"
      needs_project_dir: true

# 4. VERIFY — Claude Code can see the server at the chosen scope.
verify:
  - command: "claude mcp get everything"
    expect_exit: 0
    needs_project_dir: true

scope: project
