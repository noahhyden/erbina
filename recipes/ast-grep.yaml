# erbina recipe — ast-grep, a cli-tool. Structural code search & rewrite.
id: ast-grep
kind: cli-tool
title: "ast-grep — a fast and polyglot tool for code structural search, lint and rewriting"
description: >
  ast-grep is a fast, polyglot tool for code structural search, linting
  and rewriting based on abstract syntax trees, matching code patterns not
  text. https://github.com/ast-grep/ast-grep

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ast-grep --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ast-grep"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id ast-grep.ast-grep --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install ast-grep"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ast-grep --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ast-grep --version"
  latest: { github: ast-grep/ast-grep }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ast-grep"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id ast-grep.ast-grep --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install ast-grep"

scope: user
