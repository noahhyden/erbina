# erbina recipe — vhs, a cli-tool. Script terminal GIF recordings.
id: vhs
kind: cli-tool
title: "vhs — your CLI home video recorder"
description: >
  VHS lets you write a simple script to generate terminal GIFs and videos,
  ideal for reproducible demos and documentation of CLI tools.
  https://github.com/charmbracelet/vhs

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "vhs --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install vhs"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id charmbracelet.vhs --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: go
      when: "command -v go"
      run: "go install github.com/charmbracelet/vhs@latest"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "vhs --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "vhs --version"
  latest: { github: charmbracelet/vhs }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade vhs"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id charmbracelet.vhs --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: go
      when: "command -v go"
      run: "go install github.com/charmbracelet/vhs@latest"

scope: user
