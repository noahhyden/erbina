# erbina recipe — caddy, a cli-tool. Web server with automatic HTTPS.
id: caddy
kind: cli-tool
title: "caddy — fast and extensible multi-platform web server with automatic HTTPS"
description: >
  Caddy is a powerful, extensible web server with automatic HTTPS via
  Let's Encrypt, usable as a reverse proxy, static file server, and more.
  https://github.com/caddyserver/caddy

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "caddy version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install caddy"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id CaddyServer.Caddy --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "caddy version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "caddy version"
  latest: { github: caddyserver/caddy }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade caddy"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id CaddyServer.Caddy --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
