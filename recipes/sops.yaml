# erbina recipe — sops, a cli-tool. Encrypt values in config files.
id: sops
kind: cli-tool
title: "sops — simple and flexible tool for managing secrets"
description: >
  sops is an editor of encrypted files that supports YAML, JSON, ENV, INI
  and binary formats and encrypts with KMS, age, PGP and more.
  https://github.com/getsops/sops

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "sops --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install sops"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "sops --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "sops --version"
  latest: { github: getsops/sops }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade sops"

scope: user
