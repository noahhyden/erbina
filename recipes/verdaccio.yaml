# erbina recipe — verdaccio, a cli-tool. Private npm proxy registry.
id: verdaccio
kind: cli-tool
title: "verdaccio — a lightweight private npm proxy registry"
description: >
  Verdaccio is a lightweight private npm proxy registry that lets you host
  private packages and cache packages from the public registry locally.
  https://github.com/verdaccio/verdaccio

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "verdaccio --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g verdaccio"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "verdaccio --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "verdaccio --version"
  latest: { github: verdaccio/verdaccio }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g verdaccio"

scope: user
