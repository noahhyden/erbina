# erbina recipe — mkdocs, a cli-tool. Markdown project documentation sites.
id: mkdocs
kind: cli-tool
title: "mkdocs — project documentation with markdown"
description: >
  MkDocs is a fast, simple static site generator geared towards building
  project documentation from markdown, configured with a single YAML file.
  https://github.com/mkdocs/mkdocs

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "mkdocs --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install mkdocs"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "mkdocs --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "mkdocs --version"
  latest: { github: mkdocs/mkdocs }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade mkdocs"

scope: user
