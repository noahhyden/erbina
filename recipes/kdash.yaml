# erbina recipe — kdash, a cli-tool. Fast Kubernetes dashboard TUI.
id: kdash
kind: cli-tool
title: "kdash — a simple and fast dashboard for Kubernetes"
description: >
  KDash is a simple and fast terminal dashboard for Kubernetes that gives
  an at-a-glance, real-time view of the resources in your cluster.
  https://github.com/kdash-rs/kdash

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kdash --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kdash"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install kdash"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kdash --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kdash --version"
  latest: { github: kdash-rs/kdash }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kdash"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install kdash"

scope: user
