# erbina recipe — elixir, a cli-tool. Functional language on the BEAM.
id: elixir
kind: cli-tool
title: "elixir — a dynamic, functional language for building scalable and maintainable applications"
description: >
  Elixir is a dynamic, functional language for building scalable and
  maintainable applications, running on the battle-tested Erlang VM with
  great concurrency. https://elixir-lang.org/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "elixir --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install elixir"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "elixir --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade elixir"

scope: user
