# erbina recipe — modern-unix, a profile (meta-recipe).
# A profile installs nothing itself; it just `requires` a curated set of recipes,
# which bootstrap resolves in order. Bootstrapping this one sets up a "modern
# Unix" CLI in a single prompt.
id: modern-unix
kind: profile
title: "modern-unix — a curated set of modern CLI replacements"
description: >
  A starter bundle of fast, friendly replacements for the classic Unix tools:
  ripgrep (grep), fd (find), bat (cat), eza (ls), dust (du), and zoxide (cd).
  Bootstrapping this profile bootstraps each of them.

requires:
  - ripgrep
  - fd
  - bat
  - eza
  - dust
  - zoxide

scope: user
