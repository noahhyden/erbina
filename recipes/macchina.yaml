# erbina recipe — macchina, a cli-tool. Fast system information fetch.
id: macchina
kind: cli-tool
title: "macchina — a fast, minimal and customizable system information tool"
description: >
  macchina is a fast, minimal and customizable system information fetch
  tool written in Rust, a lightweight alternative to neofetch for terminal
  system info. https://github.com/Macchina-CLI/macchina

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "macchina --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install macchina"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install macchina"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "macchina --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "macchina --version"
  latest: { github: Macchina-CLI/macchina }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade macchina"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install macchina"

scope: user
