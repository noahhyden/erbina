# erbina recipe — shellcheck, a cli-tool. Static analysis for shell scripts.
id: shellcheck
kind: cli-tool
title: "shellcheck — a static analysis tool for shell scripts"
description: >
  ShellCheck is a static analysis tool that gives warnings and suggestions
  for bash/sh shell scripts, catching common bugs and portability issues.
  https://github.com/koalaman/shellcheck

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "shellcheck --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install shellcheck"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id koalaman.shellcheck --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "shellcheck --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "shellcheck --version"
  latest: { github: koalaman/shellcheck }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade shellcheck"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id koalaman.shellcheck --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
