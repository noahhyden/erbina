# erbina recipe — prettier, a cli-tool. Opinionated multi-language formatter.
id: prettier
kind: cli-tool
title: "prettier — an opinionated code formatter"
description: >
  Prettier is an opinionated code formatter that supports many languages
  and integrates with most editors, enforcing a consistent style
  automatically. https://github.com/prettier/prettier

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "prettier --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g prettier"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "prettier --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "prettier --version"
  latest: { github: prettier/prettier }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g prettier"

scope: user
