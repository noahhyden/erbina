# erbina recipe — syft, a cli-tool. Generate SBOMs from images/filesystems.
id: syft
kind: cli-tool
title: "syft — generate a software bill of materials from container images and filesystems"
description: >
  Syft generates a Software Bill of Materials (SBOM) from container images
  and filesystems, cataloging packages across many ecosystems for
  supply-chain visibility. https://github.com/anchore/syft

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "syft --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install syft"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "syft --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "syft --version"
  latest: { github: anchore/syft }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade syft"

scope: user
