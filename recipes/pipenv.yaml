# erbina recipe — pipenv, a cli-tool. Pipfile-based Python env manager.
id: pipenv
kind: cli-tool
title: "pipenv — Python development workflow for humans"
description: >
  Pipenv combines pip and virtualenv into a single tool, managing
  dependencies via a Pipfile and Pipfile.lock for reproducible Python
  environments. https://github.com/pypa/pipenv

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pipenv --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install pipenv"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pipenv --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pipenv --version"
  latest: { github: pypa/pipenv }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade pipenv"

scope: user
