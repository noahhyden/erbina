# erbina recipe — oha, a cli-tool. HTTP load testing with a live TUI.
id: oha
kind: cli-tool
title: "oha — HTTP load generator with a realtime TUI"
description: >
  oha is an HTTP load generator inspired by rakyll/hey, with a real-time
  terminal UI showing latency histograms, throughput and status-code
  breakdowns. https://github.com/hatoo/oha

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "oha --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install oha"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install oha"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "oha --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "oha --version"
  latest: { github: hatoo/oha }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade oha"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install oha"

scope: user
