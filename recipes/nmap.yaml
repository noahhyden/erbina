# erbina recipe — nmap, a cli-tool. Network discovery & port scanning.
id: nmap
kind: cli-tool
title: "nmap — the network mapper, a utility for network discovery and security auditing"
description: >
  Nmap (Network Mapper) is a utility for network discovery and security
  auditing, probing hosts and services and fingerprinting operating
  systems. https://nmap.org/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "nmap --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install nmap"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "nmap --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade nmap"

scope: user
