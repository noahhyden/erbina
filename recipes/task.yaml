# erbina recipe — task, a cli-tool. Simple YAML-based task runner.
id: task
kind: cli-tool
title: "task — a task runner / build tool that aims to be simpler and easier to use than make"
description: >
  Task is a task runner and build tool that aims to be simpler and easier
  to use than GNU Make, defining tasks and dependencies in a readable YAML
  Taskfile. https://github.com/go-task/task

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "task --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install go-task"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "task --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "task --version"
  latest: { github: go-task/task }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade go-task"

scope: user
