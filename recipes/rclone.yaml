# erbina recipe — rclone, a cli-tool. Sync files to/from cloud storage.
id: rclone
kind: cli-tool
title: "rclone — rsync for cloud storage"
description: >
  rclone is a command-line program to manage files on cloud storage,
  supporting dozens of providers with sync, mount, and encryption
  features. https://github.com/rclone/rclone

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "rclone --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install rclone"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "rclone --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "rclone --version"
  latest: { github: rclone/rclone }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade rclone"

scope: user
