# erbina recipe — pspg, a cli-tool. Tabular pager for psql output.
id: pspg
kind: cli-tool
title: "pspg — a unix pager optimized for psql and other tabular output"
description: >
  pspg is a unix pager optimized for psql and other tabular data output,
  adding frozen headers, cursor navigation, sorting and themes to table
  viewing. https://github.com/okbob/pspg

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pspg --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pspg"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pspg --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pspg --version"
  latest: { github: okbob/pspg }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pspg"

scope: user
category: database
