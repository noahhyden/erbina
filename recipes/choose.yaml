# erbina recipe — choose, a cli-tool. Friendlier `cut` for fields.
id: choose
kind: cli-tool
title: "choose — a human-friendly and fast alternative to cut and (sometimes) awk"
description: >
  choose is a human-friendly and fast alternative to cut (and sometimes
  awk) for selecting fields from lines by index or range with intuitive
  syntax. https://github.com/theryangeary/choose

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "choose --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: cargo
      when: "command -v cargo"
      run: "cargo install choose"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "choose --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "choose --version"
  latest: { github: theryangeary/choose }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: cargo
      when: "command -v cargo"
      run: "cargo install choose"

scope: user
