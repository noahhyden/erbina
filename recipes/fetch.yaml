# erbina recipe — an mcp-server kind, to exercise scope-aware wiring.
# Unlike a cli-tool, the `configure` phase wires the server into Claude Code at
# the chosen scope via `claude mcp add ... --scope ${scope}`. ${scope} is
# substituted from the `scope` argument passed to `bootstrap` (local|project|
# user). For project scope the commands run inside `project_dir` so the entry
# lands in that repo's .mcp.json.
id: fetch
kind: mcp-server
title: "fetch — official MCP server for retrieving web content"
description: >
  The Model Context Protocol reference "fetch" server: lets an agent retrieve
  and convert web pages to markdown. No API key. Runs via uvx, so there is no
  separate package install — wiring it into a Claude Code scope is the work.

# 1. DETECT — already registered? `claude mcp get` resolves project scope from
# the cwd, so this is gated on project_dir.
detect:
  command: "claude mcp get fetch"
  expect_exit: 0
  needs_project_dir: true

# 2. INSTALL — nothing to download (uvx fetches on first run); just confirm the
# runtime that will launch the server is present.
install:
  methods:
    - id: uvx
      when: "command -v uvx"
      run: "command -v uvx"

# 3. CONFIGURE — the scope-aware wiring. Writes the server entry at ${scope}:
#   project -> <project_dir>/.mcp.json   user -> ~/.claude.json   local -> per-project
configure:
  steps:
    - run: "claude mcp add fetch --scope ${scope} -- uvx mcp-server-fetch"
      needs_project_dir: true

# 4. VERIFY — Claude Code can see the server at the chosen scope.
verify:
  - command: "claude mcp get fetch"
    expect_exit: 0
    needs_project_dir: true

scope: project
