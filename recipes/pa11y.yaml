# erbina recipe — pa11y, a cli-tool. Automated accessibility testing.
id: pa11y
kind: cli-tool
title: "pa11y — your automated accessibility testing pal"
description: >
  pa11y runs automated accessibility tests against web pages from the
  command line, reporting WCAG issues so you can fix them before they
  ship. https://github.com/pa11y/pa11y

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pa11y --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g pa11y"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pa11y --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g pa11y"

scope: user
