# erbina recipe — devspace, a cli-tool. Fast Kubernetes dev workflows.
id: devspace
kind: cli-tool
title: "devspace — a client-only developer tool for fast Kubernetes development"
description: >
  DevSpace is a client-only developer tool for Kubernetes that lets you
  build, test and debug applications directly inside a cluster with fast
  hot reloading. https://github.com/devspace-sh/devspace

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "devspace --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install devspace"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "devspace --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "devspace --version"
  latest: { github: devspace-sh/devspace }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade devspace"

scope: user
