# erbina recipe — typos, a cli-tool. Low-false-positive spell checker for code.
id: typos
kind: cli-tool
title: "typos — source code spell checker"
description: >
  typos is a source-code spell checker designed for low false positives so
  it is fast enough to run in CI and pre-commit across a whole repository.
  https://github.com/crate-ci/typos

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "typos --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install typos-cli"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install typos-cli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "typos --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "typos --version"
  latest: { github: crate-ci/typos }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade typos-cli"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install typos-cli"

scope: user
category: text
