# erbina recipe — qpdf, a cli-tool. Transform and inspect PDF files.
id: qpdf
kind: cli-tool
title: "qpdf — a command-line program that does structural, content-preserving transformations on PDF files"
description: >
  qpdf is a command-line program and library that does structural,
  content-preserving transformations on PDF files, such as linearizing,
  encrypting and splitting. https://github.com/qpdf/qpdf

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "qpdf --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install qpdf"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "qpdf --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "qpdf --version"
  latest: { github: qpdf/qpdf }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade qpdf"

scope: user
