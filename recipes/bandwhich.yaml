# erbina recipe — bandwhich, a cli-tool. Per-process network bandwidth monitor.
id: bandwhich
kind: cli-tool
title: "bandwhich — terminal bandwidth utilization tool"
description: >
  bandwhich is a CLI utility for displaying current network utilization by
  process, connection and remote host in a live terminal view.
  https://github.com/imsnif/bandwhich

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "bandwhich --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install bandwhich"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install bandwhich"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "bandwhich --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "bandwhich --version"
  latest: { github: imsnif/bandwhich }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade bandwhich"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install bandwhich"

scope: user
