# erbina recipe — dos2unix, a cli-tool. Convert line endings (CRLF/LF).
id: dos2unix
kind: cli-tool
title: "dos2unix — text file format converter between DOS/Mac and Unix line endings"
description: >
  dos2unix converts text files between DOS/Windows, Mac and Unix
  line-ending formats, cleaning up CRLF/LF differences across platforms.
  https://waterlan.home.xs4all.nl/dos2unix.html

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "dos2unix --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install dos2unix"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "dos2unix --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade dos2unix"

scope: user
