# erbina recipe — hostctl, a cli-tool. Manage /etc/hosts profiles.
id: hostctl
kind: cli-tool
title: "hostctl — a CLI tool to manage /etc/hosts with ease"
description: >
  hostctl is a CLI tool to manage /etc/hosts with profiles, letting you
  enable, disable and group host entries without hand-editing the file.
  https://github.com/guumaster/hostctl

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "hostctl --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install hostctl"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "hostctl --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "hostctl --version"
  latest: { github: guumaster/hostctl }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade hostctl"

scope: user
