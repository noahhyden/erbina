# erbina recipe — jaq, a cli-tool. Fast jq clone in Rust.
id: jaq
kind: cli-tool
title: "jaq — a jq clone focused on correctness, speed and simplicity"
description: >
  jaq is a clone of the jq JSON processor written in Rust, focused on
  correctness, speed and simplicity while staying largely compatible with
  jq syntax. https://github.com/01mf02/jaq

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "jaq --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install jaq"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install jaq"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "jaq --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "jaq --version"
  latest: { github: 01mf02/jaq }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade jaq"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install jaq"

scope: user
