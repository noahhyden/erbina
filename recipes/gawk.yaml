# erbina recipe — gawk, a cli-tool. GNU AWK text-processing language.
id: gawk
kind: cli-tool
title: "gawk — the GNU implementation of the AWK programming language"
description: >
  gawk is the GNU implementation of the AWK programming language for
  pattern scanning and processing, with many extensions over standard awk.
  https://www.gnu.org/software/gawk/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gawk --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gawk"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gawk --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gawk"

scope: user
category: text
