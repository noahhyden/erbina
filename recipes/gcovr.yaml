# erbina recipe — gcovr, a cli-tool. C/C++ coverage reports.
id: gcovr
kind: cli-tool
title: "gcovr — generate code coverage reports with gcc/gcov"
description: >
  gcovr generates code coverage reports from gcc/gcov output, producing
  text, HTML, Cobertura and other formats for C and C++ projects in CI.
  https://github.com/gcovr/gcovr

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gcovr --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install gcovr"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gcovr --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gcovr --version"
  latest: { github: gcovr/gcovr }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade gcovr"

scope: user
