# erbina recipe — zig, a cli-tool. General-purpose systems language.
id: zig
kind: cli-tool
title: "zig — a general-purpose programming language and toolchain for maintaining robust software"
description: >
  Zig is a general-purpose programming language and toolchain for
  maintaining robust, optimal and reusable software, with manual memory
  management and a powerful build system. https://github.com/ziglang/zig

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "zig version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install zig"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "zig version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "zig version"
  latest: { github: ziglang/zig }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade zig"

scope: user
