# erbina recipe — terraform-docs, a cli-tool. Generate docs for Terraform modules.
id: terraform-docs
kind: cli-tool
title: "terraform-docs — generate documentation from Terraform modules"
description: >
  terraform-docs generates documentation from Terraform modules in various
  output formats, keeping module inputs, outputs and providers documented
  automatically. https://github.com/terraform-docs/terraform-docs

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "terraform-docs --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install terraform-docs"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "terraform-docs --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "terraform-docs --version"
  latest: { github: terraform-docs/terraform-docs }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade terraform-docs"

scope: user
