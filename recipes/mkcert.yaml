# erbina recipe — mkcert, a cli-tool. Locally-trusted dev TLS certs.
id: mkcert
kind: cli-tool
title: "mkcert — a simple tool for making locally-trusted development certificates"
description: >
  mkcert is a simple zero-config tool to make locally-trusted development
  certificates, installing a local CA into the system and browser trust
  stores. https://github.com/FiloSottile/mkcert

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "mkcert --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install mkcert"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "mkcert --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "mkcert --version"
  latest: { github: FiloSottile/mkcert }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade mkcert"

scope: user
