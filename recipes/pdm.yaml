# erbina recipe — pdm, a cli-tool. Modern Python package manager.
id: pdm
kind: cli-tool
title: "pdm — a modern Python package and dependency manager supporting the latest PEP standards"
description: >
  PDM is a modern Python package and dependency manager supporting the
  latest PEP standards, with PEP 582 support and a fast resolver, an
  alternative to Poetry. https://github.com/pdm-project/pdm

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pdm --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install pdm"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pdm --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pdm --version"
  latest: { github: pdm-project/pdm }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade pdm"

scope: user
