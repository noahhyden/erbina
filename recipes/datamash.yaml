# erbina recipe — datamash, a cli-tool. Statistics and grouping on text data.
id: datamash
kind: cli-tool
title: "datamash — a command-line program which performs basic numeric, textual and statistical operations on input textual data"
description: >
  GNU datamash performs basic numeric, textual and statistical operations
  on input data, grouping, summing and computing stats on columns from the
  command line. https://www.gnu.org/software/datamash/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "datamash --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install datamash"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "datamash --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade datamash"

scope: user
