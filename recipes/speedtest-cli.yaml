# erbina recipe — speedtest-cli, a cli-tool. Test internet bandwidth from the CLI.
id: speedtest-cli
kind: cli-tool
title: "speedtest-cli — command line interface for testing internet bandwidth using speedtest.net"
description: >
  speedtest-cli is a command-line interface for testing internet bandwidth
  using speedtest.net, reporting download, upload and latency numbers.
  https://github.com/sivel/speedtest-cli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "speedtest-cli --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install speedtest-cli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "speedtest-cli --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "speedtest-cli --version"
  latest: { github: sivel/speedtest-cli }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade speedtest-cli"

scope: user
