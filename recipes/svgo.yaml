# erbina recipe — svgo, a cli-tool. Optimize SVG files.
id: svgo
kind: cli-tool
title: "svgo — Node.js tool for optimizing SVG files"
description: >
  SVGO (SVG Optimizer) is a Node.js-based tool for optimizing SVG vector
  graphics files, removing redundant metadata and shrinking file size.
  https://github.com/svg/svgo

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "svgo --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g svgo"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "svgo --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "svgo --version"
  latest: { github: svg/svgo }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g svgo"

scope: user
