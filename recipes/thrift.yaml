# erbina recipe — thrift, a cli-tool. Apache Thrift IDL compiler.
id: thrift
kind: cli-tool
title: "thrift — the Apache Thrift compiler for scalable cross-language services"
description: >
  Apache Thrift is a framework for scalable cross-language services
  development; the thrift compiler generates client and server code from
  an IDL definition. https://thrift.apache.org/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "thrift --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install thrift"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "thrift --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade thrift"

scope: user
category: data
