# erbina recipe — lsd, a cli-tool. ls with icons and colors.
id: lsd
kind: cli-tool
title: "lsd — the next-gen ls command"
description: >
  lsd is a rewrite of ls with lots of added features like colors, icons,
  tree-view and more formatting options for a friendlier directory
  listing. https://github.com/lsd-rs/lsd

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "lsd --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install lsd"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install lsd"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "lsd --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "lsd --version"
  latest: { github: lsd-rs/lsd }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade lsd"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install lsd"

scope: user
category: files
