# erbina recipe — yazi, a cli-tool. Async terminal file manager.
id: yazi
kind: cli-tool
title: "yazi — blazing-fast terminal file manager"
description: >
  Yazi is a blazing-fast terminal file manager written in Rust with async
  I/O, image previews, and a plugin system for an efficient file-browsing
  experience. https://github.com/sxyazi/yazi

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "yazi --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install yazi"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "yazi --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "yazi --version"
  latest: { github: sxyazi/yazi }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade yazi"

scope: user
