# erbina recipe — yt-dlp, a cli-tool. Download audio/video from the web.
id: yt-dlp
kind: cli-tool
title: "yt-dlp — a feature-rich command-line audio/video downloader"
description: >
  yt-dlp is a feature-rich command-line audio/video downloader with
  support for thousands of sites, a maintained fork of youtube-dl.
  https://github.com/yt-dlp/yt-dlp

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "yt-dlp --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install yt-dlp"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id yt-dlp.yt-dlp --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: pipx
      when: "command -v pipx"
      run: "pipx install yt-dlp"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "yt-dlp --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "yt-dlp --version"
  latest: { github: yt-dlp/yt-dlp }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade yt-dlp"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id yt-dlp.yt-dlp --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade yt-dlp"

scope: user
