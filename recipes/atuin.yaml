# erbina recipe — atuin, a cli-tool. Sync, search and back up shell history.
id: atuin
kind: cli-tool
title: "atuin — magical shell history"
description: >
  Atuin replaces your shell history with a searchable, syncable SQLite
  database, adding context (exit code, duration, directory) and optional
  end-to-end-encrypted sync. https://github.com/atuinsh/atuin

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "atuin --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install atuin"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install atuin"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "atuin --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "atuin --version"
  latest: { github: atuinsh/atuin }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade atuin"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install atuin"

scope: user
