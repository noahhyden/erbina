# erbina recipe — starship, a cli-tool. Fast, customizable cross-shell prompt.
id: starship
kind: cli-tool
title: "starship — the minimal, blazing-fast, cross-shell prompt"
description: >
  Starship is a minimal, extremely fast, and customizable prompt for any
  shell, showing the info you need at a glance.
  https://github.com/starship/starship

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "starship --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install starship"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Starship.Starship --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install starship"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "starship --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "starship --version"
  latest: { github: starship/starship }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade starship"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Starship.Starship --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install starship"

scope: user
