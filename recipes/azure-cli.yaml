# erbina recipe — azure-cli, a cli-tool. Manage Azure from the CLI (`az`).
id: azure-cli
kind: cli-tool
title: "azure-cli — the command-line tools for managing Azure resources (`az`)"
description: >
  The Azure CLI (az) is a set of commands to create and manage Azure
  resources from the terminal or in automation scripts, across the Azure
  platform. https://github.com/Azure/azure-cli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "az version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install azure-cli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "az version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade azure-cli"

scope: user
