# erbina recipe — gleam, a cli-tool. Type-safe language on the BEAM.
id: gleam
kind: cli-tool
title: "gleam — a friendly language for building type-safe systems that scale"
description: >
  Gleam is a friendly, type-safe language for building scalable systems
  that run on the Erlang virtual machine (and JavaScript), with a powerful
  type system. https://github.com/gleam-lang/gleam

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gleam --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gleam"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gleam --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gleam --version"
  latest: { github: gleam-lang/gleam }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gleam"

scope: user
