# erbina recipe — pv, a cli-tool. Show progress of data in a pipe.
id: pv
kind: cli-tool
title: "pv — pipe viewer, monitor the progress of data through a pipe"
description: >
  pv (Pipe Viewer) lets you monitor the progress of data through a
  pipeline, showing throughput, elapsed time, an ETA and a progress bar.
  https://www.ivarch.com/programs/pv.shtml

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pv --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pv"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pv --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pv"

scope: user
