# erbina recipe — tmux, a cli-tool. Terminal multiplexer.
id: tmux
kind: cli-tool
title: "tmux — a terminal multiplexer"
description: >
  tmux lets you switch easily between several programs in one terminal,
  detach them (they keep running in the background) and reattach to a
  session. https://github.com/tmux/tmux

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "tmux -V"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install tmux"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "tmux -V"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "tmux -V"
  latest: { github: tmux/tmux }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade tmux"

scope: user
