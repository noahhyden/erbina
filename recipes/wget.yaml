# erbina recipe — wget, a cli-tool. Non-interactive HTTP/FTP downloader.
id: wget
kind: cli-tool
title: "wget — the non-interactive network downloader"
description: >
  GNU Wget is a free utility for non-interactive download of files from
  the web, supporting HTTP, HTTPS and FTP, recursion and resumed
  downloads. https://www.gnu.org/software/wget/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "wget --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install wget"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id JernejSimoncic.Wget --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "wget --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade wget"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id JernejSimoncic.Wget --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
