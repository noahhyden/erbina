# erbina recipe — autoconf, a cli-tool. Generate portable configure scripts.
id: autoconf
kind: cli-tool
title: "autoconf — a tool for producing configure scripts for building software"
description: >
  GNU Autoconf is a tool for producing shell scripts that automatically
  configure software source code packages to adapt to many kinds of
  Unix-like systems. https://www.gnu.org/software/autoconf/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "autoconf --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install autoconf"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "autoconf --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade autoconf"

scope: user
