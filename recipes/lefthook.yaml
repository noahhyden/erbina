# erbina recipe — lefthook, a cli-tool. Fast polyglot git hooks manager.
id: lefthook
kind: cli-tool
title: "lefthook — a fast and powerful git hooks manager"
description: >
  Lefthook is a fast, powerful and language-agnostic git hooks manager
  that runs commands in parallel and is configured with a single YAML
  file. https://github.com/evilmartians/lefthook

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "lefthook version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install lefthook"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id evilmartians.lefthook --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "lefthook version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "lefthook version"
  latest: { github: evilmartians/lefthook }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade lefthook"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id evilmartians.lefthook --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
