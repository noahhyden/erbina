# erbina recipe — awscli, a cli-tool. Manage AWS from the CLI (`aws`).
id: awscli
kind: cli-tool
title: "awscli — the AWS Command Line Interface (`aws`)"
description: >
  The AWS Command Line Interface (aws) is a unified tool to manage AWS
  services from the terminal, scripting operations across the full breadth
  of AWS APIs. https://github.com/aws/aws-cli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "aws --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install awscli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "aws --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade awscli"

scope: user
