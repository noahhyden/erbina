# erbina recipe — tflint, a cli-tool. Linter for Terraform.
id: tflint
kind: cli-tool
title: "tflint — a pluggable Terraform linter"
description: >
  TFLint is a pluggable linter for Terraform that finds possible errors,
  warns about deprecated syntax, and enforces best-practice conventions.
  https://github.com/terraform-linters/tflint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "tflint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install tflint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "tflint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "tflint --version"
  latest: { github: terraform-linters/tflint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade tflint"

scope: user
