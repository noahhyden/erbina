# erbina recipe — jpegoptim, a cli-tool. Optimize JPEG files.
id: jpegoptim
kind: cli-tool
title: "jpegoptim — utility to optimize and compress JPEG files"
description: >
  jpegoptim is a utility to optimize and compress JPEG files losslessly
  (or with a target quality), reducing file size for the web.
  https://github.com/tjko/jpegoptim

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "jpegoptim --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install jpegoptim"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "jpegoptim --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade jpegoptim"

scope: user
