# erbina recipe — topgrade, a cli-tool. Upgrade all your package managers at once.
id: topgrade
kind: cli-tool
title: "topgrade — upgrade everything with one command"
description: >
  topgrade detects which package managers and tools you use and runs their
  upgrade commands in sequence, keeping your whole system up to date from
  one command. https://github.com/topgrade-rs/topgrade

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "topgrade --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install topgrade"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install topgrade"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "topgrade --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "topgrade --version"
  latest: { github: topgrade-rs/topgrade }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade topgrade"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install topgrade"

scope: user
