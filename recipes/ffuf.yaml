# erbina recipe — ffuf, a cli-tool. Fast web fuzzer.
id: ffuf
kind: cli-tool
title: "ffuf — fast web fuzzer written in Go"
description: >
  ffuf (Fuzz Faster U Fool) is a fast web fuzzer for content discovery,
  parameter fuzzing and virtual-host discovery, widely used in web
  security testing. https://github.com/ffuf/ffuf

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ffuf -V"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ffuf"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id ffuf.ffuf --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ffuf -V"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ffuf -V"
  latest: { github: ffuf/ffuf }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ffuf"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id ffuf.ffuf --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
