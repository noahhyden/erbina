# erbina recipe — octave, a cli-tool. MATLAB-compatible numerical computing.
id: octave
kind: cli-tool
title: "octave — a high-level language primarily intended for numerical computations"
description: >
  GNU Octave is a high-level language primarily intended for numerical
  computations, largely compatible with MATLAB, with a powerful
  command-line interface. https://www.gnu.org/software/octave/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "octave --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install octave"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "octave --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade octave"

scope: user
