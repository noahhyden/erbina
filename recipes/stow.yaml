# erbina recipe — stow, a cli-tool. Symlink-farm manager for dotfiles.
id: stow
kind: cli-tool
title: "stow — GNU Stow, a symlink farm manager"
description: >
  GNU Stow is a symlink farm manager that takes distinct packages of files
  in separate directories and makes them appear installed in a single
  tree, popular for dotfiles. https://www.gnu.org/software/stow/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "stow --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install stow"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "stow --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade stow"

scope: user
