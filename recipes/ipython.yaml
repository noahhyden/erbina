# erbina recipe — ipython, a cli-tool. Enhanced interactive Python shell.
id: ipython
kind: cli-tool
title: "ipython — a powerful interactive Python shell"
description: >
  IPython provides a rich architecture for interactive computing with a
  powerful Python shell featuring introspection, tab-completion and magic
  commands. https://github.com/ipython/ipython

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ipython --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install ipython"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ipython --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ipython --version"
  latest: { github: ipython/ipython }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade ipython"

scope: user
