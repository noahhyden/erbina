# erbina recipe — wireguard-tools, a cli-tool. Configure WireGuard tunnels (`wg`).
id: wireguard-tools
kind: cli-tool
title: "wireguard-tools — the wg command-line tools for WireGuard VPN (`wg`)"
description: >
  wireguard-tools provides the wg and wg-quick command-line utilities for
  configuring WireGuard, the fast and modern VPN tunnel.
  https://www.wireguard.com/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "wg --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install wireguard-tools"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "wg --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade wireguard-tools"

scope: user
