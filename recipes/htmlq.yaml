# erbina recipe — htmlq, a cli-tool. Extract content from HTML with CSS selectors.
id: htmlq
kind: cli-tool
title: "htmlq — like jq, but for HTML"
description: >
  htmlq is like jq but for HTML: it uses CSS selectors to extract
  elements, attributes and text from HTML documents on the command line.
  https://github.com/mgdm/htmlq

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "htmlq --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install htmlq"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install htmlq"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "htmlq --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "htmlq --version"
  latest: { github: mgdm/htmlq }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade htmlq"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install htmlq"

scope: user
