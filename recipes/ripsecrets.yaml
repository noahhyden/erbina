# erbina recipe — ripsecrets, a cli-tool. Pre-commit secret scanner.
id: ripsecrets
kind: cli-tool
title: "ripsecrets — a command-line tool to prevent committing secret keys into your source code"
description: >
  ripsecrets is a fast command-line tool that scans for secret keys and
  credentials to prevent committing them into source code, designed for
  pre-commit hooks. https://github.com/sirwart/ripsecrets

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ripsecrets --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install ripsecrets"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install ripsecrets"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ripsecrets --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ripsecrets --version"
  latest: { github: sirwart/ripsecrets }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade ripsecrets"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install ripsecrets"

scope: user
