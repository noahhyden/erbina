# erbina recipe — ptpython, a cli-tool. Advanced Python REPL.
id: ptpython
kind: cli-tool
title: "ptpython — a better Python REPL"
description: >
  ptpython is an advanced Python REPL built on prompt_toolkit, with syntax
  highlighting, multiline editing, autocompletion and configurable key
  bindings. https://github.com/prompt-toolkit/ptpython

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "ptpython --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install ptpython"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "ptpython --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "ptpython --version"
  latest: { github: prompt-toolkit/ptpython }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade ptpython"

scope: user
