# erbina recipe — pm2, a cli-tool. Process manager for Node.js.
id: pm2
kind: cli-tool
title: "pm2 — a production process manager for Node.js applications with a built-in load balancer"
description: >
  PM2 is a production process manager for Node.js applications with a
  built-in load balancer, keeping apps alive, reloading them, and managing
  logs and clustering. https://github.com/Unitech/pm2

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pm2 --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g pm2"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pm2 --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pm2 --version"
  latest: { github: Unitech/pm2 }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g pm2"

scope: user
category: monitoring
