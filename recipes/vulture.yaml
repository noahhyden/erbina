# erbina recipe — vulture, a cli-tool. Find unused Python code.
id: vulture
kind: cli-tool
title: "vulture — find dead code in Python programs"
description: >
  Vulture finds unused code in Python programs, reporting unused
  functions, classes, variables and imports, useful for cleaning up and
  shrinking codebases. https://github.com/jendrikseipp/vulture

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "vulture --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install vulture"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "vulture --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "vulture --version"
  latest: { github: jendrikseipp/vulture }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade vulture"

scope: user
