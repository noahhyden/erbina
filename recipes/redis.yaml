# erbina recipe — redis, a cli-tool. Redis server + `redis-cli` client.
id: redis
kind: cli-tool
title: "redis — an in-memory data store; ships the `redis-cli` client"
description: >
  Redis is an in-memory data structure store used as a database, cache and
  message broker; the package ships the redis-cli client for talking to a
  server. https://github.com/redis/redis

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "redis-cli --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install redis"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Redis.Redis --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "redis-cli --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "redis-cli --version"
  latest: { github: redis/redis }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade redis"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Redis.Redis --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
