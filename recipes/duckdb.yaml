# erbina recipe — duckdb, a cli-tool. In-process analytical SQL database.
id: duckdb
kind: cli-tool
title: "duckdb — an in-process SQL OLAP database management system"
description: >
  DuckDB is an in-process SQL OLAP database management system, fast for
  analytical queries over local files like Parquet and CSV, the SQLite of
  analytics. https://github.com/duckdb/duckdb

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "duckdb --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install duckdb"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "duckdb --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "duckdb --version"
  latest: { github: duckdb/duckdb }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade duckdb"

scope: user
