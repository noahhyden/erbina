# erbina recipe — mods, a cli-tool. LLM pipelines on the CLI.
id: mods
kind: cli-tool
title: "mods — AI on the command line"
description: >
  mods is a tool for adding AI to your command-line pipelines: pipe output
  into it and get an LLM response formatted as markdown, with model and
  prompt options. https://github.com/charmbracelet/mods

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "mods --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install mods"
    - id: go
      when: "command -v go"
      run: "go install github.com/charmbracelet/mods@latest"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "mods --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "mods --version"
  latest: { github: charmbracelet/mods }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade mods"
    - id: go
      when: "command -v go"
      run: "go install github.com/charmbracelet/mods@latest"

scope: user
