# erbina recipe — pueue, a cli-tool. Queue and manage long-running commands.
id: pueue
kind: cli-tool
title: "pueue — a command-line task management tool for sequential and parallel execution"
description: >
  Pueue is a command-line task management tool that lets you queue shell
  commands, run them sequentially or in parallel, and manage a background
  daemon of jobs. https://github.com/Nukesor/pueue

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pueue --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pueue"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install pueue"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pueue --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pueue --version"
  latest: { github: Nukesor/pueue }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pueue"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install pueue"

scope: user
