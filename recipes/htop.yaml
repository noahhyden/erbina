# erbina recipe — htop, a cli-tool. Interactive process viewer.
id: htop
kind: cli-tool
title: "htop — an interactive process viewer"
description: >
  htop is an interactive process viewer for Unix systems, a friendlier and
  more capable alternative to top with scrolling, colors and tree view.
  https://github.com/htop-dev/htop

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "htop --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install htop"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "htop --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "htop --version"
  latest: { github: htop-dev/htop }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade htop"

scope: user
