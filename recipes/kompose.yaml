# erbina recipe — kompose, a cli-tool. Convert Compose files to Kubernetes.
id: kompose
kind: cli-tool
title: "kompose — go from Docker Compose to Kubernetes"
description: >
  Kompose is a tool to help users who are familiar with docker-compose
  move to Kubernetes by translating a Compose file into Kubernetes
  manifests. https://github.com/kubernetes/kompose

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kompose version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kompose"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kompose version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kompose version"
  latest: { github: kubernetes/kompose }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kompose"

scope: user
