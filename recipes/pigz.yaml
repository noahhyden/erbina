# erbina recipe — pigz, a cli-tool. Parallel multi-core gzip.
id: pigz
kind: cli-tool
title: "pigz — a parallel implementation of gzip for modern multi-processor machines"
description: >
  pigz (parallel gzip) is a fully functional replacement for gzip that
  exploits multiple processors and cores to compress data much faster.
  https://github.com/madler/pigz

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pigz --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pigz"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pigz --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pigz"

scope: user
