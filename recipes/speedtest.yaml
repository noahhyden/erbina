# erbina recipe — speedtest, a cli-tool. Command-line internet bandwidth tester.
id: speedtest
kind: cli-tool
title: "speedtest — command-line internet bandwidth tester (speedtest.net)"
description: >
  speedtest-cli measures your internet bandwidth (download, upload, ping)
  from the command line using speedtest.net's servers.
  https://github.com/sivel/speedtest-cli

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "speedtest --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install speedtest-cli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "speedtest --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade speedtest-cli"

scope: user
