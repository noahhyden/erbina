# erbina recipe — buku, a cli-tool. Command-line bookmark manager.
id: buku
kind: cli-tool
title: "buku — a powerful bookmark manager and mini web-tagger"
description: >
  buku is a private, flexible command-line bookmark manager that stores
  bookmarks with tags in a local database and works like a text-based
  mini-web. https://github.com/jarun/buku

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "buku --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install buku"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "buku --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade buku"

scope: user
