# erbina recipe — gradle, a cli-tool. Flexible JVM build tool.
id: gradle
kind: cli-tool
title: "gradle — an open-source build automation tool focused on flexibility and performance"
description: >
  Gradle is an open-source build automation tool focused on flexibility
  and performance, widely used for JVM projects and Android with a
  Groovy/Kotlin DSL. https://github.com/gradle/gradle

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gradle --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gradle"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gradle --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gradle --version"
  latest: { github: gradle/gradle }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gradle"

scope: user
