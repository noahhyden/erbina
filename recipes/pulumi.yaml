# erbina recipe — pulumi, a cli-tool. IaC in general-purpose languages.
id: pulumi
kind: cli-tool
title: "pulumi — infrastructure as code in your favorite language"
description: >
  Pulumi is an infrastructure-as-code platform that lets you define cloud
  resources using familiar languages like TypeScript, Python, Go and C#.
  https://github.com/pulumi/pulumi

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pulumi version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pulumi"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Pulumi.Pulumi --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pulumi version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "pulumi version"
  latest: { github: pulumi/pulumi }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pulumi"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Pulumi.Pulumi --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
