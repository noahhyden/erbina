# erbina recipe — npkill, a cli-tool. Find and delete node_modules.
id: npkill
kind: cli-tool
title: "npkill — easily find and remove old and heavy node_modules folders"
description: >
  npkill lets you list and interactively delete old, heavy node_modules
  directories scattered across your system to quickly reclaim disk space.
  https://github.com/voidcosmos/npkill

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "npkill --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g npkill"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "npkill --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "npkill --version"
  latest: { github: voidcosmos/npkill }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g npkill"

scope: user
