# erbina recipe — yamllint, a cli-tool. Linter for YAML files.
id: yamllint
kind: cli-tool
title: "yamllint — a linter for YAML files"
description: >
  yamllint is a linter for YAML files that checks for syntax validity plus
  cosmetic problems like line length, trailing spaces and indentation
  consistency. https://github.com/adrienverge/yamllint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "yamllint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx install yamllint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "yamllint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "yamllint --version"
  latest: { github: adrienverge/yamllint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: pipx
      when: "command -v pipx"
      run: "pipx upgrade yamllint"

scope: user
