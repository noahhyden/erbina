# erbina recipe — maven, a cli-tool. Java build & dependency tool (`mvn`).
id: maven
kind: cli-tool
title: "maven — a build automation and project management tool for Java (`mvn`)"
description: >
  Apache Maven is a build automation and project management tool primarily
  for Java projects, managing builds, dependencies and releases from a POM
  file. https://maven.apache.org/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "mvn --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install maven"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "mvn --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade maven"

scope: user
