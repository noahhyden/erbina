# erbina recipe — gpg-tui, a cli-tool. Manage GPG keys in a TUI.
id: gpg-tui
kind: cli-tool
title: "gpg-tui — a terminal user interface for GnuPG"
description: >
  gpg-tui is a terminal user interface for GnuPG that lets you manage keys
  (list, import, export, sign, delete) interactively without memorizing
  gpg flags. https://github.com/orhun/gpg-tui

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gpg-tui --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gpg-tui"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install gpg-tui"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gpg-tui --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gpg-tui --version"
  latest: { github: orhun/gpg-tui }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gpg-tui"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install gpg-tui"

scope: user
