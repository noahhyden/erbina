# erbina recipe — timg, a cli-tool. View images/video in the terminal.
id: timg
kind: cli-tool
title: "timg — a terminal image and video viewer"
description: >
  timg is a terminal image and video viewer that displays media using
  high-resolution block characters or the Kitty/iTerm graphics protocols.
  https://github.com/hzeller/timg

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "timg --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install timg"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "timg --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "timg --version"
  latest: { github: hzeller/timg }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade timg"

scope: user
