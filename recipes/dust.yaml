# erbina recipe — dust, a cli-tool. A more intuitive `du` (disk usage).
id: dust
kind: cli-tool
title: "dust — a more intuitive version of du"
description: >
  dust gives an instant, tree-style view of what's using disk space, sorted and
  colourised. Installs the `dust` binary. https://github.com/bootandy/dust

# 1. DETECT — already installed? `dust --version` exits 0 when present.
detect:
  command: "dust --version"
  expect_exit: 0

# 2. INSTALL — prefer brew; fall back to cargo. NOTE the name mismatch: the brew
# formula and binary are `dust`, but the cargo crate is `du-dust`.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install dust"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id bootandy.dust --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install du-dust"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "dust --version"
    expect_exit: 0

# 4. VERSION — `dust --version` prints "Dust 1.1.1"; bootandy/dust tags "v1.1.1".
version:
  current: "dust --version"
  latest: { github: bootandy/dust }

# 5. UPDATE — brew upgrade (formula `dust`), else re-run cargo install (`du-dust`).
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade dust"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id bootandy.dust --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install du-dust"

scope: user
