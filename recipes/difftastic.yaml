# erbina recipe — difftastic, a cli-tool.
id: difftastic
kind: cli-tool
title: "difftastic — a structural (syntax-aware) diff tool"
description: >
  difftastic compares files by their syntax tree, so diffs track code structure
  rather than lines. Installs the `difft` binary. https://github.com/Wilfred/difftastic

# 1. DETECT — already installed? `difft --version` exits 0 when present.
detect:
  command: "difft --version"
  expect_exit: 0

# 2. INSTALL — first guard to pass wins. Prefer brew; fall back to cargo.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install difftastic"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install difftastic"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "difft --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed `--version` vs the GitHub release tag).
version:
  current: "difft --version"
  latest: { github: Wilfred/difftastic }

# 5. UPDATE — how `update` upgrades it (brew, else re-run the cargo install).
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade difftastic"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install difftastic"

# 6. UNINSTALL — reverse the install with the SAME manager that owns it. cargo must
# come before the rm fallback: `rm`-ing the `difft` binary leaves cargo's install
# record (.crates2.json) intact, so a later `cargo install difftastic` no-ops
# ("already installed, use --force") and never rebuilds the binary — a broken
# reinstall. `cargo uninstall` clears the record AND removes the binary.
uninstall:
  methods:
    - id: homebrew
      when: "brew list difftastic"
      run: "brew uninstall difftastic"
    - id: cargo
      when: "cargo install --list 2>/dev/null | grep -q '^difftastic '"
      run: "cargo uninstall difftastic"
    - id: rm
      when: "command -v difft"
      run: "rm -f \"$(command -v difft)\""

scope: user
