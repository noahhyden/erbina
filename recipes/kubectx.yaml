# erbina recipe — kubectx, a cli-tool. Switch kube contexts fast.
id: kubectx
kind: cli-tool
title: "kubectx — faster switching between Kubernetes contexts"
description: >
  kubectx is a tool to switch between Kubernetes contexts (and, with
  kubens, namespaces) faster and more comfortably than kubectl config
  commands. https://github.com/ahmetb/kubectx

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "kubectx --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install kubectx"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id ahmetb.kubectx --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "kubectx --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "kubectx --version"
  latest: { github: ahmetb/kubectx }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade kubectx"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id ahmetb.kubectx --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"

scope: user
