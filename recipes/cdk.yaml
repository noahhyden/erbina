# erbina recipe — cdk, a cli-tool. AWS infra as code (`cdk`).
id: cdk
kind: cli-tool
title: "aws-cdk — define cloud infrastructure using familiar programming languages (`cdk`)"
description: >
  The AWS Cloud Development Kit (CDK) lets you define cloud infrastructure
  using familiar programming languages and provision it through
  CloudFormation. https://github.com/aws/aws-cdk

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "cdk --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g aws-cdk"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "cdk --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "cdk --version"
  latest: { github: aws/aws-cdk }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g aws-cdk"

scope: user
