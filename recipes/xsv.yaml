# erbina recipe — xsv, a cli-tool. Fast CSV slicing and analysis.
id: xsv
kind: cli-tool
title: "xsv — a fast CSV command line toolkit"
description: >
  xsv is a fast CSV command-line toolkit for indexing, slicing, analyzing,
  splitting and joining CSV files, built on Rust for speed on large
  datasets. https://github.com/BurntSushi/xsv

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "xsv --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install xsv"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xsv"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "xsv --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "xsv --version"
  latest: { github: BurntSushi/xsv }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade xsv"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install xsv"

scope: user
