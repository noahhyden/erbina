# erbina recipe — htmlhint, a cli-tool. Static analysis linter for HTML.
id: htmlhint
kind: cli-tool
title: "htmlhint — the static code analysis tool you need for your HTML"
description: >
  HTMLHint is a static code analysis tool for HTML that checks markup
  against a configurable set of rules to catch mistakes and enforce
  conventions. https://github.com/htmlhint/HTMLHint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "htmlhint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g htmlhint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "htmlhint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "htmlhint --version"
  latest: { github: htmlhint/HTMLHint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g htmlhint"

scope: user
