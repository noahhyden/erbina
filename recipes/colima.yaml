# erbina recipe — colima, a cli-tool. Container runtime for macOS/Linux.
id: colima
kind: cli-tool
title: "colima — container runtimes on macOS (and Linux) with minimal setup"
description: >
  Colima provides container runtimes on macOS and Linux with minimal
  setup, a lightweight, open alternative for running Docker and Kubernetes
  locally. https://github.com/abiosoft/colima

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "colima --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install colima"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "colima --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "colima --version"
  latest: { github: abiosoft/colima }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade colima"

scope: user
