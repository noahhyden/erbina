# erbina recipe — golangci-lint, a cli-tool. Aggregate linter runner for Go.
id: golangci-lint
kind: cli-tool
title: "golangci-lint — fast linters runner for Go"
description: >
  golangci-lint is a fast Go linters runner that bundles dozens of
  linters, runs them in parallel, caches results, and integrates cleanly
  with editors and CI. https://github.com/golangci/golangci-lint

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "golangci-lint --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install golangci-lint"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "golangci-lint --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "golangci-lint --version"
  latest: { github: golangci/golangci-lint }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade golangci-lint"

scope: user
