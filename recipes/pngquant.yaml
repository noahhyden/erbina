# erbina recipe — pngquant, a cli-tool. Lossy PNG compressor.
id: pngquant
kind: cli-tool
title: "pngquant — a command-line utility to convert 24/32-bit PNGs to 8-bit paletted PNGs"
description: >
  pngquant is a command-line utility and library for lossy compression of
  PNG images, dramatically reducing file size while preserving alpha
  transparency. https://github.com/kornelski/pngquant

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "pngquant --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install pngquant"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "pngquant --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade pngquant"

scope: user
