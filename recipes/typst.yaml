# erbina recipe — typst, a cli-tool. Modern typesetting (LaTeX alternative).
id: typst
kind: cli-tool
title: "typst — a new markup-based typesetting system that is powerful and easy to learn"
description: >
  Typst is a new markup-based typesetting system that is powerful and easy
  to learn, designed as a modern, faster alternative to LaTeX for
  documents. https://github.com/typst/typst

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "typst --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install typst"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install typst-cli"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "typst --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "typst --version"
  latest: { github: typst/typst }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade typst"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install typst-cli"

scope: user
category: docs
