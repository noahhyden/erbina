# erbina recipe — yarn, a cli-tool. JavaScript package manager.
id: yarn
kind: cli-tool
title: "yarn — fast, reliable and secure dependency management for JavaScript"
description: >
  Yarn is a package manager for JavaScript that provides fast, reliable
  and secure dependency management, an alternative to npm with workspaces
  and plug'n'play. https://github.com/yarnpkg/berry

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "yarn --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install yarn"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id Volta.Volta --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: npm
      when: "command -v npm"
      run: "npm install -g yarn"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "yarn --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade yarn"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id Volta.Volta --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: npm
      when: "command -v npm"
      run: "npm update -g yarn"

scope: user
