# erbina recipe — flac, a cli-tool. Free lossless audio codec.
id: flac
kind: cli-tool
title: "flac — the reference implementation of the Free Lossless Audio Codec"
description: >
  FLAC is the Free Lossless Audio Codec; the flac command encodes and
  decodes audio to and from the lossless FLAC format from the command
  line. https://github.com/xiph/flac

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "flac --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install flac"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "flac --version"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade flac"

scope: user
