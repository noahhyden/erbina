# erbina recipe — parcel, a cli-tool. Zero-config web build tool.
id: parcel
kind: cli-tool
title: "parcel — the zero-configuration build tool for the web"
description: >
  Parcel is a zero-configuration build tool for the web that bundles your
  application's assets fast, with out-of-the-box support for many
  languages and formats. https://github.com/parcel-bundler/parcel

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "parcel --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm install -g parcel"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "parcel --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "parcel --version"
  latest: { github: parcel-bundler/parcel }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: npm
      when: "command -v npm"
      run: "npm update -g parcel"

scope: user
category: build
