# erbina recipe — gitui, a cli-tool. Fast terminal UI for git.
id: gitui
kind: cli-tool
title: "gitui — blazing-fast terminal UI for git"
description: >
  GitUI provides a fast, keyboard-driven terminal interface to git, an
  ergonomic alternative to the git CLI for staging, committing and
  browsing. https://github.com/extrawurst/gitui

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "gitui --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install gitui"
    - id: winget
      when: "winget --version"
      run: "winget install -e --id StephanDilly.gitui --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install gitui"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "gitui --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "gitui --version"
  latest: { github: extrawurst/gitui }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade gitui"
    - id: winget
      when: "winget --version"
      run: "winget upgrade -e --id StephanDilly.gitui --source winget --silent --accept-package-agreements --accept-source-agreements --disable-interactivity"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install gitui"

scope: user
