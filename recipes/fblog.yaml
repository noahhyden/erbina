# erbina recipe — fblog, a cli-tool. Pretty-print JSON logs.
id: fblog
kind: cli-tool
title: "fblog — a small command-line JSON log viewer"
description: >
  fblog is a small command-line JSON log viewer that parses and
  pretty-prints structured JSON logs, highlighting fields and levels for
  readability. https://github.com/brocode/fblog

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "fblog --version"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install fblog"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install fblog"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "fblog --version"
    expect_exit: 0

# 4. VERSION — powers check_updates (installed vs latest GitHub tag).
version:
  current: "fblog --version"
  latest: { github: brocode/fblog }

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade fblog"
    - id: cargo
      when: "command -v cargo"
      run: "cargo install fblog"

scope: user
