# erbina recipe — exiftool, a cli-tool. Read/write file metadata (EXIF, etc.).
id: exiftool
kind: cli-tool
title: "exiftool — read, write and edit meta information in a wide variety of files"
description: >
  ExifTool is a platform-independent command-line application for reading,
  writing and editing meta information (EXIF, IPTC, XMP) in a wide variety
  of files. https://exiftool.org/

# 1. DETECT — already installed? Exits 0 when present.
detect:
  command: "exiftool -ver"
  expect_exit: 0

# 2. INSTALL — first passing guard wins.
install:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew install exiftool"

# 3. VERIFY — prove it actually runs.
verify:
  - command: "exiftool -ver"
    expect_exit: 0

# 5. UPDATE — how `update` upgrades an installed copy.
update:
  methods:
    - id: homebrew
      when: "command -v brew"
      run: "brew upgrade exiftool"

scope: user
