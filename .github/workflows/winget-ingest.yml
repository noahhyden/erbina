name: Ingest winget ids

# On-demand harvester that proposes `winget` PackageIdentifiers for recipe rows
# that lack Windows coverage. Unlike the brew ingester it installs nothing: it
# downloads the winget *community source* index (the SQLite catalog the `winget`
# CLI itself uses) and resolves ids against it, tiered by confidence — so it runs
# on plain ubuntu with stdlib only (no winget, no Windows). The result is uploaded
# as an artifact for a human to review and merge into scripts/recipe_data.py —
# never committed automatically (a wrong id would install the wrong software).
#
# Manual only: new install methods should be reviewed before they ship.

on:
  workflow_dispatch:
    inputs:
      min-confidence:
        description: "Lowest tier to emit (high | medium | low)"
        required: false
        default: "high"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Resolve winget ids for winget-less recipes
        run: |
          set -euo pipefail
          # stdlib only, but run through uv for a pinned interpreter.
          uv run --python 3.12 scripts/winget_candidates.py \
            --min-confidence "${{ github.event.inputs.min-confidence }}" \
            --out winget_proposals.json
          echo "=== proposals ==="; cat winget_proposals.json
      - name: Upload proposals for review
        uses: actions/upload-artifact@v4
        with:
          name: winget-proposals
          path: winget_proposals.json
