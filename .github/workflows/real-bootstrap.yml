name: Real bootstrap smoke

# The pytest suite is deterministic and OFFLINE — it proves the orchestration is
# correct but never runs a real package manager, so a renamed brew formula, a dead
# install URL, a wrong `go install` path, or a bad MCP-server package name would
# pass CI yet break a real bootstrap. This workflow closes that gap: it bootstraps
# recipes FOR REAL on runners that actually have the package managers.
#
# It is deliberately NOT wired to push/pull_request — real installs are slow and
# occasionally flaky (upstream/network), so this must never gate a PR. It runs on
# a weekly schedule and on manual dispatch, and fails loudly when a recipe rots.

on:
  workflow_dispatch:
    inputs:
      recipes:
        description: "Space-separated recipe ids for the brew/fallback jobs (blank = defaults)"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  # macOS runners ship brew preinstalled, so the `homebrew` install method fires
  # first for every cli-tool — this validates ALL of the brew FORMULA NAMES.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Bootstrap every cli-tool recipe for real (brew)
        run: |
          set -euo pipefail
          RECIPES="${{ github.event.inputs.recipes }}"
          if [ -z "$RECIPES" ]; then
            RECIPES="ataegina bat bottom delta difftastic dust eza fd gh httpie hyperfine jq lazygit procs ripgrep sd tealdeer tokei uv yq zoxide"
          fi
          echo "bootstrapping: $RECIPES"
          uv run --with fastmcp --with pyyaml --with packaging scripts/smoke_bootstrap.py $RECIPES

  # Windows runners ship winget, so the `winget` install method fires (brew/cargo
  # guards fail cleanly in cmd.exe). Validate every winget PACKAGE ID exists
  # (`winget show`, fast + reliable), then bootstrap a stable subset for real
  # end-to-end (with winget's shim dir pre-added to PATH so a just-installed tool
  # is found by detect/verify in the same run).
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Every winget id resolves
        run: |
          $ids = @(
            "BurntSushi.ripgrep.MSVC","sharkdp.fd","sharkdp.bat","jqlang.jq","GitHub.cli",
            "dandavison.delta","ajeetdsouza.zoxide","sharkdp.hyperfine","astral-sh.uv",
            "JesseDuffield.lazygit","MikeFarah.yq","bootandy.dust","Clement.bottom"
          )
          $bad = @()
          foreach ($id in $ids) {
            winget show --id $id -e --source winget --disable-interactivity 2>$null | Out-Null
            if ($LASTEXITCODE -ne 0) { $bad += $id; Write-Host "MISSING $id" } else { Write-Host "ok  $id" }
          }
          if ($bad.Count -gt 0) { Write-Error "unknown winget ids: $($bad -join ', ')"; exit 1 }
      - name: Bootstrap a stable subset for real (winget)
        run: |
          $env:PATH = "$env:LOCALAPPDATA\Microsoft\WinGet\Links;$env:PATH"
          uv run --with fastmcp --with pyyaml --with packaging scripts/smoke_bootstrap.py ripgrep jq zoxide

  # Ubuntu has Go and Rust (cargo) preinstalled but no brew, so the NON-brew
  # fallback methods fire — validates the `go install` / `cargo install` / `pipx`
  # paths. Kept to a fast subset (cargo builds from source).
  ubuntu-fallbacks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ensure pipx and put tool bindirs on PATH
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet pipx || true
          { echo "$HOME/.local/bin"; echo "$HOME/go/bin"; echo "$HOME/.cargo/bin"; } >> "$GITHUB_PATH"
      - name: Bootstrap recipes for real (go / cargo / pipx)
        run: |
          set -euo pipefail
          RECIPES="${{ github.event.inputs.recipes }}"
          if [ -z "$RECIPES" ]; then
            RECIPES="lazygit yq httpie difftastic"
          fi
          echo "bootstrapping: $RECIPES"
          uv run --with fastmcp --with pyyaml --with packaging scripts/smoke_bootstrap.py $RECIPES

  # Round-trip: bootstrap -> uninstall -> REINSTALL, failing unless the reinstall
  # is ok. This is the arm that catches a package manager whose teardown leaves
  # install state behind (a pipx venv, a cargo .crates2.json record) so the
  # reinstall silently no-ops and never relinks/rebuilds the binary. The rest of
  # this workflow only ever installs once, so it can't see that class of bug.
  # Limited to recipes that ship an `uninstall:` block and install via a manager
  # present on Ubuntu (pipx/cargo/go).
  roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ensure pipx and put tool bindirs on PATH
        run: |
          set -euo pipefail
          python3 -m pip install --user --quiet pipx || true
          { echo "$HOME/.local/bin"; echo "$HOME/go/bin"; echo "$HOME/.cargo/bin"; } >> "$GITHUB_PATH"
      - name: Install -> uninstall -> reinstall must all be ok
        run: |
          set -euo pipefail
          # httpie (pipx) + difftastic (cargo) exercise the state-tracking managers
          # this test exists for; yq + lazygit (go) confirm the rm path still round-trips.
          uv run --with fastmcp --with pyyaml --with packaging \
            scripts/smoke_bootstrap.py --roundtrip httpie difftastic yq lazygit

  # Exercise gh's `webi` fallback specifically: GitHub runners ship gh preinstalled
  # (and have no brew), so we remove it first to force the curl|sh method to fire.
  gh-webi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Remove preinstalled gh so the webi method must run
        run: |
          set -euo pipefail
          sudo apt-get remove -y gh >/dev/null 2>&1 || true
          sudo rm -f "$(command -v gh)" 2>/dev/null || true
          hash -r
          command -v gh && { echo "gh still present — cannot test webi"; exit 1; } || echo "gh removed"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"   # where webi installs
      - name: Bootstrap gh for real (webi)
        run: |
          set -euo pipefail
          uv run --with fastmcp --with pyyaml --with packaging scripts/smoke_bootstrap.py gh

  # MCP-server recipes wire via `claude mcp add` — the `claude` CLI isn't on CI, so
  # a stub records add/get (validates the wiring end to end with the REAL recipes'
  # commands), and separately every server PACKAGE name is resolved for real
  # (PyPI for uvx, npm for npx) — the actual real-world risk.
  mcp-servers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install a stub `claude` (records mcp add / answers mcp get)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" "$HOME/claude-stub-store"
          cat > "$HOME/.local/bin/claude" <<'STUB'
          #!/usr/bin/env bash
          STORE="${CLAUDE_STUB_STORE:-$HOME/claude-stub-store}"
          mkdir -p "$STORE"
          if [ "$1" = "mcp" ] && [ "$2" = "add" ]; then echo "$*" > "$STORE/$3"; exit 0; fi
          if [ "$1" = "mcp" ] && [ "$2" = "get" ]; then [ -f "$STORE/$3" ] && exit 0 || exit 1; fi
          if [ "$1" = "mcp" ] && [ "$2" = "list" ]; then ls "$STORE" 2>/dev/null; exit 0; fi
          exit 0
          STUB
          chmod +x "$HOME/.local/bin/claude"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Wire every mcp-server recipe for real (stub claude, uvx + npx present)
        run: |
          set -euo pipefail
          export CLAUDE_STUB_STORE="$HOME/claude-stub-store"
          proj="$(mktemp -d)"
          for rid in everything fetch git memory sequentialthinking time; do
            uv run --with fastmcp --with pyyaml --with packaging \
              scripts/smoke_bootstrap.py "$rid" --scope project --project-dir "$proj"
          done
      - name: Resolve every MCP-server package for real (PyPI + npm)
        run: |
          set -euo pipefail
          echo "--- uvx / PyPI packages ---"
          for pkg in mcp-server-fetch mcp-server-git mcp-server-time; do
            curl -fsSL -o /dev/null "https://pypi.org/pypi/$pkg/json" && echo "ok  $pkg" || { echo "MISSING $pkg on PyPI"; exit 1; }
          done
          echo "--- npx / npm packages ---"
          for pkg in @modelcontextprotocol/server-everything @modelcontextprotocol/server-memory @modelcontextprotocol/server-sequential-thinking; do
            npm view "$pkg" version >/dev/null 2>&1 && echo "ok  $pkg" || { echo "MISSING $pkg on npm"; exit 1; }
          done
